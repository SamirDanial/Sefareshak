appId: com.bellami.desktop
productName: Next Foody Dashboard
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - build/icon.icns  # Include .icns file for macOS
  - build/icon.png   # Include PNG for other platforms
# Icon configuration - using Bellami mobile app icon
icon: build/icon.png
mac:
  category: public.app-category.food-drink
  target:
    - dmg
    - zip
  icon: build/icon.icns  # Use pre-generated .icns file for proper macOS icon styling
  entitlements: build/entitlements.mac.plist
  hardenedRuntime: false  # Disable hardened runtime (requires code signing)
  gatekeeperAssess: false
  identity: null  # Disable code signing for development builds
  extendInfo:
    CFBundleDisplayName: "Next Foody Dashboard"
    CFBundleName: "Next Foody Dashboard"
    NSLocationWhenInUseUsageDescription: "This app needs access to your location to automatically fill your business address and check delivery availability."
    NSLocationAlwaysUsageDescription: "This app needs access to your location to automatically fill your business address and check delivery availability."
win:
  target:
    - nsis
    - portable
  icon: build/icon.png  # Windows will convert PNG to .ico automatically
linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png  # Linux uses PNG directly

